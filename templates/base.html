<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KnobelFuchs 🦊</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; }
        [x-cloak] { display: none !important; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-strong {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Schwebende Hintergrund-Elemente */
        .floating-bg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
            font-size: 4rem;
        }
        .float-1 { top: 10%; left: 5%; animation: floatAround 20s ease-in-out infinite; }
        .float-2 { top: 30%; right: 8%; animation: floatAround 25s ease-in-out infinite reverse; }
        .float-3 { bottom: 20%; left: 10%; animation: floatAround 22s ease-in-out infinite 3s; }
        .float-4 { top: 60%; right: 15%; animation: floatAround 18s ease-in-out infinite 5s; }
        .float-5 { bottom: 10%; right: 5%; animation: floatAround 23s ease-in-out infinite 2s; }
        .float-6 { top: 5%; left: 40%; animation: floatAround 26s ease-in-out infinite 7s; }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -20px) rotate(10deg); }
            50% { transform: translate(-20px, 15px) rotate(-5deg); }
            75% { transform: translate(15px, 25px) rotate(8deg); }
        }

        /* Button-Animationen */
        .btn-option {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-option:focus-visible {
            outline: 2px solid #f97316;
            outline-offset: 2px;
        }
        .btn-option:active {
            transform: scale(0.96);
        }
        .btn-option::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--tap-x, 50%) var(--tap-y, 50%), rgba(251, 146, 60, 0.15), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-option:active::after {
            opacity: 1;
        }

        /* Optionen nacheinander einblenden */
        .option-enter {
            animation: optionSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
        .option-enter:nth-child(1) { animation-delay: 0.05s; }
        .option-enter:nth-child(2) { animation-delay: 0.12s; }
        .option-enter:nth-child(3) { animation-delay: 0.19s; }
        .option-enter:nth-child(4) { animation-delay: 0.26s; }

        @keyframes optionSlideIn {
            0% { transform: translateX(-20px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* Richtig/Falsch Farb-Flash auf Optionen */
        .option-correct {
            animation: flashCorrect 0.6s ease-out;
            background: #dcfce7 !important;
            border-color: #22c55e !important;
        }
        .option-wrong {
            animation: flashWrong 0.5s ease-out;
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
        }
        @keyframes flashCorrect {
            0% { transform: scale(1); }
            30% { transform: scale(1.03); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
            100% { transform: scale(1); }
        }
        @keyframes flashWrong {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        /* Haupt-Animationen */
        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .slide-up {
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .pop-in {
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Streak-Feuer */
        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(251, 146, 60, 0.4); }
            50% { box-shadow: 0 0 20px rgba(251, 146, 60, 0.8), 0 0 40px rgba(251, 146, 60, 0.3); }
        }

        .streak-fire {
            animation: streakFire 0.3s ease-out;
        }
        @keyframes streakFire {
            0% { transform: scale(1) rotate(0); }
            50% { transform: scale(1.4) rotate(-5deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* Level-Up */
        .level-up-flash {
            animation: levelUpFlash 1s ease-out;
        }
        @keyframes levelUpFlash {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); color: #f97316; text-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
            100% { transform: scale(1); }
        }

        .level-up-banner {
            animation: levelUpBanner 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes levelUpBanner {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* Shake */
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Ergebnis-Emoji */
        .result-emoji {
            animation: resultEmojiPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes resultEmojiPop {
            0% { transform: scale(0) rotate(-30deg); }
            60% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* Fortschrittsbalken */
        .progress-fill {
            transition: width 0.8s ease-in-out;
        }

        /* Timer-Ring */
        .timer-ring {
            transition: stroke-dashoffset 1s linear;
        }

        /* Card-Flip fuer Raetsel-Wechsel */
        .card-enter {
            animation: cardEnter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cardEnter {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Spieler-Karten Hover */
        .player-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .player-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        .player-card:active {
            transform: scale(0.97);
        }

        /* Funkelnde Sterne */
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle 0.8s ease-out forwards;
        }
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0); opacity: 1; }
            50% { transform: scale(1) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* Countdown-Wiggle */
        .wiggle {
            animation: wiggle 0.3s ease-in-out;
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        /* Sanfter Glow fuer aktive Elemente */
        .glow-green {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4), 0 0 30px rgba(34, 197, 94, 0.2);
        }
        .glow-orange {
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4), 0 0 30px rgba(249, 115, 22, 0.2);
        }

        /* Accessibility: sr-only */
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}

        /* Fluid Typography */
        h1, .text-4xl { font-size: clamp(1.75rem, 4vw, 2.25rem) !important; }
        h2, .text-2xl { font-size: clamp(1.25rem, 3vw, 1.5rem) !important; }
        .text-7xl { font-size: clamp(3rem, 8vw, 4.5rem) !important; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            body { background-size: 100% 100% !important; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="font-nunito">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:bg-purple-600 focus:text-white focus:p-2 focus:rounded focus:z-50">Zum Inhalt springen</a>
    <!-- Schwebende Hintergrund-Emojis -->
    <div class="floating-bg float-1">🧩</div>
    <div class="floating-bg float-2">🔢</div>
    <div class="floating-bg float-3">📝</div>
    <div class="floating-bg float-4">🌟</div>
    <div class="floating-bg float-5">🦊</div>
    <div class="floating-bg float-6">😎</div>

    <div id="main-content" class="relative z-10">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
